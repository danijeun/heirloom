<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F7EDD5" />
    <title>Heirloom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/src/assets/badge1.png" id="favicon" />
    <script>
      function updateFavicon() {
        const theme = document.documentElement.getAttribute('data-theme');
        const favicon = document.getElementById('favicon');
        favicon.href = theme === 'dark' ? '/src/assets/badge2.png' : '/src/assets/badge1.png';
      }
      updateFavicon();
      const observer = new MutationObserver(updateFavicon);
      observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
